{{ define "main" }}
<div class="flex items-center justify-center min-h-[65vh] px-4 py-8">
  <div class="w-full max-w-lg p-8 rounded-3xl bg-white/40 dark:bg-black/50 backdrop-blur-xl border border-black/10 dark:border-white/10 shadow-2xl transition-all duration-300">

    <div class="text-center mb-8">
      <h2 class="text-3xl font-extrabold text-black dark:text-white tracking-tight">Upload Asset</h2>
      <p class="text-sm text-black/60 dark:text-white/60 mt-1">Upload files directly to the PCIU class library.</p>
    </div>

    <form id="uploadForm" class="space-y-5" onsubmit="return false;">
      
      <!-- Course Selector -->
      <div>
        <label for="courseSelect" class="block text-xs font-semibold uppercase tracking-wider text-black/70 dark:text-white/70 mb-2">
          Course
        </label>
        <select id="courseSelect" class="w-full px-4 py-3 rounded-xl bg-white/70 dark:bg-neutral-900/80 border border-black/10 dark:border-white/10 text-black dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
          <option value="ACC-100">ACC-100 — Financial Accounting</option>
          <option value="BUS 100">BUS 100 — Introduction to Business</option>
          <option value="ENG 101">ENG 101 — English Composition</option>
          <option value="HIST-101">HIST-101 — History of Bangladesh</option>
          <option value="MGT 200">MGT 200 — Principles of Management</option>
          <option value="MKT 200">MKT 200 — Principles of Marketing</option>
        </select>
      </div>

      <!-- Category Selector -->
      <div>
        <label for="categorySelect" class="block text-xs font-semibold uppercase tracking-wider text-black/70 dark:text-white/70 mb-2">
          Category
        </label>
        <select id="categorySelect" class="w-full px-4 py-3 rounded-xl bg-white/70 dark:bg-neutral-900/80 border border-black/10 dark:border-white/10 text-black dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
          <option value="CLS-CONTENT">Class Content (PDF, PPT, DOC)</option>
          <option value="CLS-NOTE">Class Notes (Images, Photos)</option>
          <option value="HW">Homework / Assignment</option>
        </select>
      </div>

      <!-- Conditional Homework Number Input -->
      <div id="hwNumberWrapper" class="hidden transition-all duration-300">
        <label for="hwNumber" class="block text-xs font-semibold uppercase tracking-wider text-black/70 dark:text-white/70 mb-2">
          Assignment #
        </label>
        <input id="hwNumber" type="number" min="1" max="99" placeholder="e.g. 1" class="w-full px-4 py-3 rounded-xl bg-white/70 dark:bg-neutral-900/80 border border-black/10 dark:border-white/10 text-black dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
      </div>

      <!-- Upload Password Secret -->
      <div>
        <label for="uploadSecret" class="block text-xs font-semibold uppercase tracking-wider text-black/70 dark:text-white/70 mb-2">
          Access Password
        </label>
        <input id="uploadSecret" type="password" placeholder="Enter authorization key" class="w-full px-4 py-3 rounded-xl bg-white/70 dark:bg-neutral-900/80 border border-black/10 dark:border-white/10 text-black dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
      </div>

      <!-- Drag and Drop Dropzone -->
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-black/70 dark:text-white/70 mb-2">
          File Attachment
        </label>
        <div id="dropZone" class="relative group flex flex-col items-center justify-center w-full min-h-[140px] p-4 border-2 border-dashed border-black/20 dark:border-white/20 rounded-2xl bg-white/20 dark:bg-black/20 hover:bg-white/40 dark:hover:bg-black/40 hover:border-indigo-500 transition-all cursor-pointer">
          <input type="file" id="fileInput" class="hidden">
          
          <div id="dropZoneContent" class="text-center space-y-2 pointer-events-none">
            <svg class="mx-auto h-8 w-8 text-black/40 dark:text-white/40 group-hover:text-indigo-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 0115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
            </svg>
            <p id="filePlaceholder" class="text-sm font-medium text-black/70 dark:text-white/70">
              Drag and drop your file here, or <span class="text-indigo-600 dark:text-indigo-400 underline">browse</span>
            </p>
            <p id="fileHint" class="text-xs text-black/40 dark:text-white/40">Max allowed file size: 100 MB</p>
          </div>
        </div>
      </div>

      <!-- Progress Meter -->
      <div id="progressWrapper" class="hidden space-y-2">
        <div class="flex justify-between text-xs text-black/60 dark:text-white/60">
          <span id="progressPercent">0%</span>
          <span id="progressSpeed">0 KB/s</span>
        </div>
        <div class="w-full h-2.5 rounded-full bg-black/10 dark:bg-white/10 overflow-hidden">
          <div id="progressBar" class="h-full bg-indigo-600 dark:bg-indigo-500 transition-all duration-150 rounded-full" style="width:0%"></div>
        </div>
      </div>

      <!-- Action Button -->
      <button
        id="uploadBtn"
        type="submit"
        class="w-full py-3.5 px-4 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-semibold rounded-xl shadow-lg hover:shadow-indigo-500/25 transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center gap-2"
      >
        <span>Upload Asset</span>
      </button>

      <!-- Status Message Output -->
      <p id="status" class="text-sm font-medium text-center min-h-[20px] transition-colors duration-200"></p>
    </form>

  </div>
</div>

<script src="{{ "js/upload.js" | relURL }}" defer></script>
{{ end }}
